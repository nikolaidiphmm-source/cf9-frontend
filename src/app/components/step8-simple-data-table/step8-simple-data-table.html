<table class="table-bordered table-stripped text-wrap">
    <thead>
        <tr class="align-middle text-center small">
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody>
        @for (row of data; track row){
            <tr class="align-middle">
                <td>{{row.firstname}}</td>
                <td>{{row.lastname}}</td>
                <td>{{row.email}}</td>
            </tr>
        }
    </tbody>
</table>
